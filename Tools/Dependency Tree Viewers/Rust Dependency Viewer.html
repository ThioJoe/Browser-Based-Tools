<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Dependency Visualizer</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #020617; } /* slate-950 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // --- Icons (Inline SVGs to remove external dependencies) ---
        const IconBase = ({ children, className }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Search = ({ className }) => (
            <IconBase className={className}>
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </IconBase>
        );

        const ChevronRight = ({ className }) => (
            <IconBase className={className}>
                <path d="m9 18 6-6-6-6"/>
            </IconBase>
        );

        const ChevronDown = ({ className }) => (
            <IconBase className={className}>
                <path d="m6 9 6 6 6-6"/>
            </IconBase>
        );

        const Box = ({ className }) => (
            <IconBase className={className}>
                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
                <path d="m3.3 7 8.7 5 8.7-5"/>
                <path d="M12 22v-10"/>
            </IconBase>
        );

        const Layers = ({ className }) => (
            <IconBase className={className}>
                <path d="m12.83 2.12-.14-.11a1 1 0 0 0-1.38 0l-.14.11L2.6 7.93a1 1 0 0 0 0 1.58l8.6 5.8a1 1 0 0 0 1.1 0l8.6-5.8a1 1 0 0 0 0-1.58Z"/>
                <path d="m2 12 10 6.75L22 12"/>
                <path d="m2 17 10 6.75L22 17"/>
            </IconBase>
        );

        const ListIcon = ({ className }) => (
            <IconBase className={className}>
                <line x1="8" x2="21" y1="6" y2="6"/>
                <line x1="8" x2="21" y1="12" y2="12"/>
                <line x1="8" x2="21" y1="18" y2="18"/>
                <line x1="3" x2="3.01" y1="6" y2="6"/>
                <line x1="3" x2="3.01" y1="12" y2="12"/>
                <line x1="3" x2="3.01" y1="18" y2="18"/>
            </IconBase>
        );

        const AlertCircle = ({ className }) => (
            <IconBase className={className}>
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" x2="12" y1="8" y2="12"/>
                <line x1="12" x2="12.01" y1="16" y2="16"/>
            </IconBase>
        );

        const Loader2 = ({ className }) => (
            <IconBase className={className}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </IconBase>
        );

        const Info = ({ className }) => (
            <IconBase className={className}>
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
            </IconBase>
        );

        // --- API Helpers ---
        
        // CORS proxy for client-side requests - If needed (crate.io apparently doesn't require it)
        const CORS_PROXY = ""; // Leave empty to not use a proxy. Example: https://corsproxy.io/?
        const API_BASE = "https://crates.io/api/v1";

        const fetchJson = async (url) => {
            const response = await fetch(`${CORS_PROXY}${url}`);
            if (!response.ok) {
                throw new Error(`Failed to fetch: ${response.statusText}`);
            }
            return response.json();
        };

        // --- Components ---

        const DependencyNode = ({ node, onToggle, onLoadChildren }) => {
            const hasDeps = node.dependencies && node.dependencies.length > 0;
            const isLoaded = node.dependencies !== undefined;

            const handleClick = (e) => {
                e.stopPropagation();
                if (!isLoaded && !node.loading) {
                    onLoadChildren(node);
                } else {
                    onToggle(node.id);
                }
            };

            return (
                <div className="ml-4 border-l border-slate-700 pl-2">
                    <div 
                        className={`flex items-center gap-2 py-1 px-2 rounded cursor-pointer hover:bg-slate-800 transition-colors ${node.loading ? 'opacity-70' : ''}`}
                        onClick={handleClick}
                    >
                        <div className="w-4 h-4 flex items-center justify-center shrink-0">
                            {node.loading ? (
                                <Loader2 className="w-3 h-3 animate-spin text-blue-400" />
                            ) : (
                                <>
                                    {node.expanded ? (
                                        <ChevronDown className="w-4 h-4 text-slate-400" />
                                    ) : (
                                        <ChevronRight className="w-4 h-4 text-slate-400" />
                                    )}
                                </>
                            )}
                        </div>
                        
                        <Box className="w-4 h-4 text-amber-500 shrink-0" />
                        
                        <span className="font-mono text-slate-200 font-medium">
                            {node.name}
                        </span>
                        
                        <span className="text-xs px-1.5 py-0.5 rounded bg-slate-700 text-blue-300 font-mono">
                            v{node.version}
                        </span>

                        {node.error && (
                            <span className="text-xs text-red-400 flex items-center gap-1">
                                <AlertCircle className="w-3 h-3" />
                                {node.error}
                            </span>
                        )}
                    </div>

                    {node.expanded && node.dependencies && (
                        <div className="animate-in fade-in slide-in-from-top-1 duration-200">
                            {node.dependencies.length === 0 ? (
                                <div className="ml-8 py-1 text-slate-500 italic text-sm">No dependencies</div>
                            ) : (
                                node.dependencies.map((dep) => (
                                    <DependencyNode 
                                        key={dep.id} 
                                        node={dep} 
                                        onToggle={onToggle}
                                        onLoadChildren={onLoadChildren}
                                    />
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [query, setQuery] = useState('');
            const [rootNode, setRootNode] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [autoLoadDepth, setAutoLoadDepth] = useState(1);
            const [processedCache] = useState(new Map());
            const [viewMode, setViewMode] = useState('tree'); // 'tree' | 'list'

            const resolveDependencies = async (crateName, version) => {
                const cacheKey = `${crateName}:${version}`;
                if (processedCache.has(cacheKey)) return processedCache.get(cacheKey);

                const data = await fetchJson(`${API_BASE}/crates/${crateName}/${version}/dependencies`);
                // Filter for normal dependencies
                const normalDeps = data.dependencies.filter((d) => d.kind === 'normal');
                
                const deps = normalDeps.map((d) => ({
                    id: d.crate_id,
                    version_req: d.req,
                    kind: d.kind,
                    optional: d.optional
                }));
                
                processedCache.set(cacheKey, deps);
                return deps;
            };

            const getLatestVersion = async (crateName) => {
                const data = await fetchJson(`${API_BASE}/crates/${crateName}`);
                if (!data.crate) throw new Error('Crate not found');
                return data.crate.max_version;
            };

            const loadNodeData = async (node, currentDepth, maxDepth) => {
                try {
                    const deps = await resolveDependencies(node.name, node.version);
                    
                    const children = await Promise.all(deps.map(async (dep) => {
                        let version = dep.version_req;
                        if (version.startsWith('^') || version.startsWith('~')) version = version.substring(1);
                        
                        let resolvedVersion = version;
                        try {
                            resolvedVersion = await getLatestVersion(dep.id);
                        } catch (e) {
                            console.warn(`Could not resolve version for ${dep.id}`);
                        }

                        return {
                            name: dep.id,
                            version: resolvedVersion,
                            loading: false,
                            expanded: currentDepth < maxDepth,
                            id: `${node.id}-${dep.id}`,
                            depth: node.depth + 1
                        };
                    }));

                    if (currentDepth < maxDepth) {
                        const expandedChildren = await Promise.all(
                            children.map(child => loadNodeData(child, currentDepth + 1, maxDepth))
                        );
                        return { ...node, dependencies: expandedChildren, loading: false, expanded: true };
                    }

                    return { ...node, dependencies: children, loading: false, expanded: true };

                } catch (err) {
                    return { ...node, loading: false, error: err.message };
                }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!query) return;

                setLoading(true);
                setError(null);
                setRootNode(null);
                setViewMode('tree');
                processedCache.clear();

                try {
                    const version = await getLatestVersion(query);
                    const root = {
                        name: query,
                        version: version,
                        loading: true,
                        expanded: true,
                        id: 'root',
                        depth: 0
                    };
                    
                    const loadedRoot = await loadNodeData(root, 0, autoLoadDepth);
                    setRootNode(loadedRoot);
                } catch (err) {
                    setError(err.message || "Failed to fetch crate");
                } finally {
                    setLoading(false);
                }
            };

            const updateTree = (nodes, targetId, transform) => {
                if (nodes.id === targetId) {
                    return transform(nodes);
                }
                if (nodes.dependencies) {
                    return {
                        ...nodes,
                        dependencies: nodes.dependencies.map(child => updateTree(child, targetId, transform))
                    };
                }
                return nodes;
            };

            const handleToggle = (id) => {
                if (!rootNode) return;
                setRootNode(prev => {
                    if (!prev) return null;
                    return updateTree(prev, id, node => ({ ...node, expanded: !node.expanded }));
                });
            };

            const handleLoadChildren = async (targetNode) => {
                if (!rootNode) return;
                
                setRootNode(prev => {
                    if (!prev) return null;
                    return updateTree(prev, targetNode.id, node => ({ ...node, loading: true }));
                });

                const loadedNode = await loadNodeData(targetNode, 0, 1);

                setRootNode(prev => {
                    if (!prev) return null;
                    return updateTree(prev, targetNode.id, () => loadedNode);
                });
            };

            // Calculate flat list of unique crates
            const flatList = useMemo(() => {
                if (!rootNode) return [];
                const map = new Map();
                const traverse = (node) => {
                    // Use name+version as key to distinguish versions
                    const key = `${node.name}-${node.version}`;
                    if (!map.has(key)) {
                        map.set(key, { name: node.name, version: node.version });
                    }
                    if (node.dependencies) {
                        node.dependencies.forEach(traverse);
                    }
                };
                traverse(rootNode);
                return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name));
            }, [rootNode]);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans p-6">
                    <div className="max-w-4xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="space-y-2">
                            <div className="flex items-center gap-3">
                                <Layers className="w-8 h-8 text-amber-500" />
                                <h1 className="text-3xl font-bold bg-gradient-to-r from-amber-200 to-amber-600 bg-clip-text text-transparent">
                                    Crate Dependency Visualizer
                                </h1>
                            </div>
                            <p className="text-slate-400">
                                Recursive dependency visualizer for Rust crates. Uses the official crates.io API.
                            </p>
                        </div>

                        {/* Controls */}
                        <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-800 backdrop-blur-sm">
                            <form onSubmit={handleSearch} className="flex gap-4 flex-col sm:flex-row">
                                <div className="relative flex-1">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 flex items-center justify-center">
                                        <Search className="w-4 h-4" />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Enter crate name (e.g., tokio, serde, ripgrep)"
                                        className="w-full bg-slate-950 border border-slate-700 rounded-lg py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-slate-200"
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                    />
                                </div>
                                
                                <div className="flex items-center gap-3 bg-slate-950 border border-slate-700 rounded-lg px-3">
                                    <label className="text-sm text-slate-400 whitespace-nowrap">Auto-Load Depth:</label>
                                    <select 
                                        value={autoLoadDepth} 
                                        onChange={(e) => setAutoLoadDepth(Number(e.target.value))}
                                        className="bg-transparent text-amber-500 font-medium focus:outline-none py-3"
                                    >
                                        <option value={0}>0 (Manual)</option>
                                        <option value={1}>1 (Direct)</option>
                                        <option value={2}>2 (Nested)</option>
                                        <option value={3}>3 (Deep)</option>
                                        <option value={100}>Unlimited (Caution)</option>
                                    </select>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="bg-amber-600 hover:bg-amber-500 text-white font-semibold py-3 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 shadow-lg shadow-amber-900/20"
                                >
                                    {loading ? <Loader2 className="w-5 h-5 animate-spin" /> : "Analyze"}
                                </button>
                            </form>
                        </div>

                        {/* Info Banner */}
                        <div className="flex items-start gap-3 p-4 bg-blue-950/30 border border-blue-900/50 rounded-lg text-sm text-blue-200/80">
                            <Info className="w-5 h-5 shrink-0 text-blue-400" />
                            <p>
                                This tool fetches the <strong>latest stable version</strong> of each dependency to build the tree. 
                                This approximates the dependency graph of a fresh project. 
                                Dev-dependencies are excluded to reduce noise.
                            </p>
                        </div>

                        {/* Results */}
                        <div className="bg-slate-900 rounded-xl border border-slate-800 min-h-[400px] p-6 shadow-xl overflow-x-auto">
                            {error && (
                                <div className="flex flex-col items-center justify-center h-full text-red-400 space-y-2">
                                    <AlertCircle className="w-12 h-12 mb-2 opacity-50" />
                                    <p className="font-semibold text-lg">Error loading crate</p>
                                    <p className="text-sm opacity-80">{error}</p>
                                </div>
                            )}

                            {!rootNode && !loading && !error && (
                                <div className="flex flex-col items-center justify-center h-full text-slate-600 space-y-4">
                                    <Box className="w-16 h-16 opacity-20" />
                                    <p>Enter a crate name above to visualize dependencies</p>
                                </div>
                            )}

                            {loading && !rootNode && (
                                <div className="flex flex-col items-center justify-center h-full text-slate-500 space-y-4">
                                    <Loader2 className="w-10 h-10 animate-spin text-amber-500" />
                                    <p>Fetching metadata from crates.io...</p>
                                </div>
                            )}

                            {rootNode && (
                                <div>
                                    <div className="pb-4 mb-4 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-end gap-4">
                                        <div>
                                            <h2 className="text-xl font-bold text-white">{rootNode.name}</h2>
                                            <span className="text-amber-500 font-mono text-sm">v{rootNode.version}</span>
                                        </div>
                                        
                                        <div className="flex items-center gap-2 bg-slate-950 rounded-lg p-1 border border-slate-700">
                                            <button
                                                onClick={() => setViewMode('tree')}
                                                className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${
                                                    viewMode === 'tree' 
                                                    ? 'bg-slate-800 text-white shadow-sm' 
                                                    : 'text-slate-400 hover:text-slate-200'
                                                }`}
                                            >
                                                <Layers className="w-4 h-4" />
                                                Tree
                                            </button>
                                            <button
                                                onClick={() => setViewMode('list')}
                                                className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${
                                                    viewMode === 'list' 
                                                    ? 'bg-slate-800 text-white shadow-sm' 
                                                    : 'text-slate-400 hover:text-slate-200'
                                                }`}
                                            >
                                                <ListIcon className="w-4 h-4" />
                                                List <span className="ml-1 bg-slate-700 px-1.5 rounded-full text-xs">{flatList.length}</span>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {viewMode === 'tree' ? (
                                        <div className="space-y-2">
                                            <div className="text-xs text-slate-500 mb-2">
                                                Click arrows to expand • Click names to load
                                            </div>
                                            <DependencyNode 
                                                node={rootNode} 
                                                onToggle={handleToggle}
                                                onLoadChildren={handleLoadChildren}
                                            />
                                        </div>
                                    ) : (
                                        <div className="animate-in fade-in duration-300">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                                {flatList.map((crate) => (
                                                    <div key={`${crate.name}-${crate.version}`} className="bg-slate-950/50 p-3 rounded border border-slate-800 flex justify-between items-center group hover:border-slate-600 transition-colors">
                                                        <div className="flex items-center gap-2">
                                                            <Box className="w-4 h-4 text-slate-600 group-hover:text-amber-500 transition-colors" />
                                                            <span className="text-slate-200 font-mono text-sm">{crate.name}</span>
                                                        </div>
                                                        <span className="text-xs px-1.5 py-0.5 rounded bg-slate-900 text-blue-300 font-mono border border-slate-800">
                                                            v{crate.version}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                            {flatList.length === 0 && (
                                                <p className="text-slate-500 text-center py-8">No dependencies found.</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
